name: PR Reminders

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '*.md'
      - 'doc/**'
      - 'examples/**'
      - 'README.md'
      - 'ChangeLog.md'

jobs:
  pr-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          base-sha: origin/${{ github.base_ref }}
          from-commit: ${{ github.event.pull_request.base.sha }}
          to-commit: ${{ github.sha }}
          files: |
            src/**
            TIGLCreator/**
            tests/unittests/**
            tests/integrationtests/**
            tests/python/**
            bindings/python_internal/**/*.i
            ChangeLog.md

      - name: Generate reminder message
        id: reminders
        run: |
          CHANGED="${{ steps.changed.outputs.all_changed_files }}"

          HAS_SRC=$(echo "$CHANGED" | grep -qE '^src/' && echo "yes" || echo "no")
          HAS_TIGL_CREATOR=$(echo "$CHANGED" | grep -qE '^TIGLCreator/' && echo "yes" || echo "no")
          HAS_UNIT=$(echo "$CHANGED" | grep -qE '^tests/unittests/' && echo "yes" || echo "no")
          HAS_INTEG=$(echo "$CHANGED" | grep -qE '^tests/integrationtests/' && echo "yes" || echo "no")
          HAS_CHANGELOG=$(echo "$CHANGED" | grep -qE '^ChangeLog\.md$' && echo "yes" || echo "no")

          REMINDERS=()
          PASSED=()

          if [ "$HAS_SRC" = "yes" ]; then
            if [ "$HAS_UNIT" = "yes" ] || [ "$HAS_INTEG" = "yes" ]; then
              PASSED+=("- :white_check_mark: **Tests**: unit/integration test added")
            else
              REMINDERS+=("- :bulb: **Tip**: Consider adding a unit or integration test")
            fi
          fi

          HAS_BINDINGS=$(echo "$CHANGED" | grep -qE '^bindings/python_internal/' && echo "yes" || echo "no")
          if [ "$HAS_SRC" = "yes" ]; then
            if [ "$HAS_BINDINGS" = "yes" ]; then
              PASSED+=("- :white_check_mark: **Python bindings**: up to date")
            else
              REMINDERS+=("- :bulb: **Tip**: Please check if new classes need to be added to the Python bindings")
            fi
          fi

          HAS_I_FILE=$(echo "$CHANGED" | grep -qE '^bindings/python_internal/.*\.i$' && echo "yes" || echo "no")
          HAS_PYTHON_TEST=$(echo "$CHANGED" | grep -qE '^tests/python/' && echo "yes" || echo "no")
          if [ "$HAS_I_FILE" = "yes" ]; then
            if [ "$HAS_PYTHON_TEST" = "yes" ]; then
              PASSED+=("- :white_check_mark: **Python tests**: test added")
            else
              REMINDERS+=("- :bulb: **Tip**: Python bindings updated — please add a Python test")
            fi
          fi

          if [ "$HAS_SRC" = "yes" ] || [ "$HAS_TIGL_CREATOR" = "yes" ]; then
            if [ "$HAS_CHANGELOG" = "yes" ]; then
              PASSED+=("- :white_check_mark: **Changelog**: entry added")
            else
              REMINDERS+=("- :memo: **Tip**: Don't forget to add an entry to \`ChangeLog.md\`")
            fi
          fi

          {
            printf '%s\n' "## PR Reminders" ""
            if [ ${#REMINDERS[@]} -gt 0 ]; then
              for item in "${REMINDERS[@]}"; do
                printf '%s\n' "$item"
              done
            else
              for item in "${PASSED[@]}"; do
                printf '%s\n' "$item"
              done
            fi
            printf '\n%s\n' "---" "_This is an automated reminder from CI_"
          } > pr-reminder-body.md

      - name: Find existing PR reminder comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions
          body-includes: _This is an automated reminder from CI_

      - name: Post PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-reminder-body.md
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
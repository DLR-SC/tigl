name: PR Reminders

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - '*.md'
      - 'doc/**'
      - 'examples/**'
      - 'README.md'
      - 'ChangeLog.md'

jobs:
  pr-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            src/**
            TIGLCreator/**
            tests/unittests/**
            tests/integrationtests/**
            tests/python/**
            bindings/python_internal/**/*.i

      - name: Generate reminder message
        id: reminders
        run: |
          CHANGED="${{ steps.changed.outputs.all_changed_files }}"

          HAS_SRC=$(echo "$CHANGED" | grep -qE '^src/' && echo "yes" || echo "no")
          HAS_TIGL_CREATOR=$(echo "$CHANGED" | grep -qE '^TIGLCreator/' && echo "yes" || echo "no")
          HAS_UNIT=$(echo "$CHANGED" | grep -qE '^tests/unittests/' && echo "yes" || echo "no")
          HAS_INTEG=$(echo "$CHANGED" | grep -qE '^tests/integrationtests/' && echo "yes" || echo "no")

          ITEMS=()
          if [ "$HAS_SRC" = "yes" ] && [ "$HAS_UNIT" = "no" ] && [ "$HAS_INTEG" = "no" ]; then
            ITEMS+=("- :bulb: **Tip**: Consider adding a unit or integration test")
          fi

          HAS_BINDINGS=$(echo "$CHANGED" | grep -qE '^bindings/python_internal/' && echo "yes" || echo "no")
          if [ "$HAS_SRC" = "yes" ] && [ "$HAS_BINDINGS" = "no" ]; then
            ITEMS+=("- :bulb: **Tip**: Please check if new classes need to be added to the Python bindings")
          fi

          HAS_I_FILE=$(echo "$CHANGED" | grep -qE '^bindings/python_internal/.*\.i$' && echo "yes" || echo "no")
          HAS_PYTHON_TEST=$(echo "$CHANGED" | grep -qE '^tests/python/' && echo "yes" || echo "no")
          if [ "$HAS_I_FILE" = "yes" ] && [ "$HAS_PYTHON_TEST" = "no" ]; then
            ITEMS+=("- :bulb: **Tip**: Python bindings updated — please add a Python test")
          fi

          if [ "$HAS_SRC" = "yes" ] || [ "$HAS_TIGL_CREATOR" = "yes" ]; then
            ITEMS+=("- :memo: **Tip**: Don't forget to add an entry to \`ChangeLog.md\`")
          fi

          {
            printf '%s\n' "## PR Reminders" "" 
            if [ ${#ITEMS[@]} -eq 0 ]; then
              printf '%s\n' "All looks good — no action needed."
            else
              for item in "${ITEMS[@]}"; do
                printf '%s\n' "$item"
              done
            fi
            printf '\n%s\n' "---" "_This is an automated reminder from CI_"
          } > pr-reminder-body.md

      - name: Find existing PR reminder comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions
          body-includes: _This is an automated reminder from CI_

      - name: Post PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-reminder-body.md
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace